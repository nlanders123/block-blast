<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#22101a">
    <meta name="description" content="Block Royale - A neon block puzzle game">
    <title>Block Royale</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
    <!-- Animated Background -->
    <div class="cosmic-bg">
        <div class="stars"></div>
        <div class="stars stars-2"></div>
        <div class="nebula"></div>
        <div class="particles" id="particles"></div>
    </div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <div class="start-content">
            <h1 class="start-title">BLOCK<br>ROYALE</h1>
            <div class="start-best-score" id="startBestScore">
                <span class="material-symbols-outlined" style="font-size: 18px; color: var(--text-muted);">emoji_events</span>
                <span>BEST: <span id="startHighScore">0</span></span>
            </div>
            <div class="start-buttons">
                <button class="btn-play" id="playBtn">
                    <span class="material-symbols-outlined" style="font-size: 28px;">play_arrow</span>
                    PLAY
                </button>
                <div class="start-secondary-buttons">
                    <button class="btn-start-secondary" id="startLeaderboardBtn">
                        <span class="material-symbols-outlined">leaderboard</span>
                        <span>Scores</span>
                    </button>
                    <button class="btn-start-secondary" id="startSettingsBtn">
                        <span class="material-symbols-outlined">settings</span>
                        <span>Settings</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Container (hidden until Play) -->
    <div class="game-container" id="gameContainer" style="display: none;">
        <!-- Header -->
        <header class="game-header">
            <button class="btn-icon" id="pauseBtn" aria-label="Pause">
                <span class="material-symbols-outlined" style="font-size: 28px;">pause</span>
            </button>

            <div class="score-display">
                <span class="score-label">SCORE</span>
                <span class="score-value" id="scoreValue">0</span>
                <div class="high-score" id="highScoreDisplay">
                    <span class="high-score-label">BEST</span>
                    <span class="high-score-value" id="highScoreValue">0</span>
                </div>
            </div>

            <button class="btn-icon" id="undoBtn" aria-label="Undo">
                <span class="material-symbols-outlined" style="font-size: 28px;">undo</span>
            </button>
        </header>

        <!-- Game Board -->
        <div class="board-container">
            <div class="board-glow"></div>
            <div class="board-frame">
                <div class="game-board" id="gameBoard"></div>
            </div>
        </div>

        <!-- Piece Tray -->
        <div class="piece-tray">
            <div class="piece-slots" id="pieceSlots">
                <div class="piece-slot" data-slot="0"></div>
                <div class="piece-slot" data-slot="1"></div>
                <div class="piece-slot" data-slot="2"></div>
            </div>
        </div>

        <!-- Ghost preview removed — pieces snap directly to grid -->

        <div class="modal-overlay" id="gameOverModal">
            <div class="modal-content game-over-style">
                <span class="material-symbols-outlined star-decoration star-tl">star</span>
                <span class="material-symbols-outlined star-decoration star-tr">auto_awesome</span>
                <span class="material-symbols-outlined star-decoration star-br">spark</span>

                <div class="new-high-score" id="newHighScore">
                    <span class="material-symbols-outlined">star</span>
                </div>

                <h2 class="modal-title neon-pink">GAME<br>OVER</h2>

                <div class="final-score-container">
                    <p class="score-label-small">FINAL SCORE</p>
                    <p class="modal-score-large" id="finalScore">0</p>
                </div>

                <div class="best-score-pill">
                    <span class="material-symbols-outlined" style="font-size: 18px; color: #9ca3af;">emoji_events</span>
                    <span>BEST: <span id="modalHighScore">0</span></span>
                </div>

                <div class="modal-buttons">
                    <button class="btn-retry" id="restartBtn">
                        <span class="material-symbols-outlined" style="color: #022c22;">replay</span>
                        RETRY
                    </button>

                    <button class="btn-home" id="homeBtn">
                        <span class="material-symbols-outlined">home</span>
                        HOME
                    </button>
                </div>
            </div>
        </div>

        <!-- Pause Modal -->
        <div class="modal-overlay" id="pauseModal">
            <div class="modal-content">
                <h2 class="modal-title">Paused</h2>
                <button class="btn-primary" id="resumeBtn">Resume</button>
                <button class="btn-secondary" id="newGameBtn">New Game</button>
                <button class="btn-secondary" id="leaderboardBtn">
                    <span class="material-symbols-outlined" style="font-size: 20px; vertical-align: middle;">leaderboard</span>
                    Leaderboard
                </button>
                <button class="btn-secondary" id="settingsBtn">
                    <span class="material-symbols-outlined" style="font-size: 20px; vertical-align: middle;">settings</span>
                    Settings
                </button>
            </div>
        </div>

        <!-- Level Complete Modal (disabled but kept for future) -->
        <div class="modal-overlay" id="levelCompleteModal">
            <div class="modal-content">
                <h2 class="modal-title neon-pink">LEVEL<br>COMPLETE!</h2>
                <p class="modal-score">Score: <span id="levelScore">0</span></p>
                <button class="btn-primary" id="nextLevelBtn">Next Level</button>
            </div>
        </div>
    </div>

    <!-- Global modals (outside game container so they work from start screen too) -->
    <div class="modal-overlay" id="leaderboardModal">
        <div class="modal-content leaderboard-modal">
            <div class="modal-header-row">
                <span class="material-symbols-outlined" style="font-size: 28px; color: var(--accent-orange);">leaderboard</span>
                <h2 class="modal-title" style="margin-bottom: 0;">Leaderboard</h2>
            </div>
            <div class="leaderboard-list" id="leaderboardList">
                <!-- Scores will be populated here -->
            </div>
            <button class="btn-secondary" id="closeLeaderboardBtn">Close</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content settings-modal">
            <div class="modal-header-row">
                <span class="material-symbols-outlined" style="font-size: 28px; color: var(--accent-teal);">settings</span>
                <h2 class="modal-title" style="margin-bottom: 0;">Settings</h2>
            </div>
            <div class="settings-list">
                <div class="settings-row">
                    <div class="settings-label">
                        <span class="material-symbols-outlined">volume_up</span>
                        <span>Sound</span>
                    </div>
                    <button class="toggle-btn active" id="soundToggle">
                        <span class="toggle-knob"></span>
                    </button>
                </div>
                <div class="settings-row">
                    <div class="settings-label">
                        <span class="material-symbols-outlined">vibration</span>
                        <span>Haptics</span>
                    </div>
                    <button class="toggle-btn active" id="hapticsToggle">
                        <span class="toggle-knob"></span>
                    </button>
                </div>
                <div class="settings-row">
                    <div class="settings-label">
                        <span class="material-symbols-outlined">light_mode</span>
                        <span>Light Mode</span>
                    </div>
                    <button class="toggle-btn" id="themeToggle">
                        <span class="toggle-knob"></span>
                    </button>
                </div>
            </div>
            <button class="btn-danger" id="clearDataBtn">
                <span class="material-symbols-outlined" style="font-size: 18px;">delete_forever</span>
                Clear All Data
            </button>
            <button class="btn-secondary" id="closeSettingsBtn" style="margin-top: 12px;">Close</button>
        </div>
    </div>

    <!-- Line Clear Effects Container -->
    <div class="effects-container" id="effectsContainer"></div>
    <script src="levels.js"></script>
    <script src="game-logic.js"></script>
    <script src="game.js"></script>
</body>

</html>
